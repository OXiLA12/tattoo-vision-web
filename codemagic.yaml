workflows:
  ios-app-store:
    name: iOS App Store
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.tattoovision.app
      vars:
        APP_STORE_CONNECT_ISSUER_ID: Encrypted(REPLACE_WITH_ENCRYPTED_ISSUER_ID)
        APP_STORE_CONNECT_KEY_IDENTIFIER: Encrypted(REPLACE_WITH_ENCRYPTED_KEY_ID)
        APP_STORE_CONNECT_PRIVATE_KEY: Encrypted(REPLACE_WITH_ENCRYPTED_P8_KEY)
        BUNDLE_ID: com.tattoovision.app
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
      node: latest

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: master
          include: true

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Build web app
        script: npm run build

      - name: Install Capacitor CLI
        script: npm install -g @capacitor/cli

      - name: Add iOS platform (if not present)
        script: |
          if [ ! -d "ios" ]; then
            npx cap add ios
          fi

      - name: Sync Capacitor
        script: npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install

      - name: Set build number
        script: |
          BUILD_NUMBER=$(( $(app-store-connect get-latest-testflight-build-number "$BUNDLE_ID") + 1 ))
          xcrun agvtool new-version -all $BUILD_NUMBER
        working_directory: ios/App

      - name: Build and sign iOS app
        script: |
          xcode-project use-profiles
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

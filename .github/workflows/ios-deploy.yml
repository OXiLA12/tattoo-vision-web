name: iOS Build & Deploy to App Store

on:
  workflow_dispatch:
  push:
    branches: [master, main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'capacitor.config.ts'

jobs:
  build-and-deploy:
    runs-on: macos-15
    timeout-minutes: 60

    env:
      BUNDLE_ID: com.tattoovision.app
      APPLE_TEAM_ID: DH98NN9LW6

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Add iOS platform
        run: npx cap add ios

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Verify iOS project (Capacitor 8 uses SPM — no CocoaPods needed)
        run: |
          echo "=== iOS project structure ==="
          find ios -maxdepth 4 \( -name "*.xcworkspace" -o -name "*.xcodeproj" -o -name "Package.swift" -o -name "Podfile" \) 2>/dev/null
          echo "=== Package.swift contents ==="
          find ios -name "Package.swift" 2>/dev/null | head -1 | xargs cat 2>/dev/null || echo "No Package.swift found"

      - name: Write App Store Connect API key
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          printf '%s' "${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}" \
            > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8

      - name: Create temporary keychain
        run: |
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH $(security list-keychains -d user | sed s/\"//g)
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV

      - name: Get and increment build number
        id: build_num
        run: |
          LATEST=$(xcrun altool \
            --list-versions ios \
            --bundle-id $BUNDLE_ID \
            --apiKey ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }} \
            --apiIssuer ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }} \
            2>/dev/null | grep -oE 'CFBundleVersion.*' | grep -oE '[0-9]+' | tail -1 || echo "0")
          BUILD=$((LATEST + 1))
          echo "build_number=$BUILD" >> $GITHUB_OUTPUT
          echo "BUILD_NUMBER=$BUILD" >> $GITHUB_ENV
          echo "Build number: $BUILD"

      - name: Set build number in Xcode project
        run: |
          cd ios/App
          xcrun agvtool new-version -all $BUILD_NUMBER

      - name: Archive iOS app (Xcode auto-signs via API key)
        run: |
          xcodebuild archive \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }} \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=$APPLE_TEAM_ID

      - name: Export IPA for App Store
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>DH98NN9LW6</string>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportPath $RUNNER_TEMP/ipa \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}

      - name: Upload IPA to App Store Connect
        run: |
          IPA=$(find $RUNNER_TEMP/ipa -name "*.ipa" | head -1)
          echo "Uploading: $IPA"
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA" \
            --apiKey ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }} \
            --apiIssuer ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          echo "✅ Upload complete — build $BUILD_NUMBER"

      - name: Save IPA as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: TattooVision-${{ env.BUILD_NUMBER }}.ipa
          path: ${{ runner.temp }}/ipa/*.ipa
          retention-days: 14

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $KEYCHAIN_PATH || true
